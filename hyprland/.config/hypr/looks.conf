#
# looks.conf
# Look and feel configuration
#

# Wait for hyprpaper to launch, and set wallpaper
# exec-once = sleep 1; hyprctl hyprpaper wallpaper ",~/Pictures/arch_nz.png"

# Cursors
exec-once = hyprctl setcursor Adwaita 24
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    layout = dwindle # Use traditional i3-like tiling
    allow_tearing = true # Disable vsync
    resize_on_border = false

    # Window border settings
    gaps_in = 5
    gaps_out = 10
    border_size = 8

    col.active_border = rgba(01cdfeee) # blue
    # col.active_border = rgba(00ff99ee) # green
    # col.active_border = rgba(ff71ceee) # pink
    col.inactive_border = rgba(595959aa)
}

dwindle {
    force_split = 2 
    preserve_split = yes 
    default_split_ratio = 1.0
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.95
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1
    }
}

bezier = snappy, 0.05, 0.9, 0.1, 1.05
animations {
    enabled = yes
    animation = windows, 1, 2, snappy
    animation = windowsOut, 1, 3, default, popin 80%
    animation = fade, 1, 3, default
    animation = workspaces, 1, 2, default, slide
}
