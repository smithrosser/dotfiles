#
# monitors.conf
# Monitor configurations for work/home setup
#

#
# Home setup
#
monitor = desc:Acer Technologies XV322QK KV 2221194F44200,3840x2160@144,0x0,1
monitor = desc:Iiyama North America PL2470H 0x000000E1,1920x1080@165,3840x0,1
monitor = desc:'Lenovo Group Limited Y25g-30 ##GTIYMxgwABdD',1920x1080@360,5760x0,1

#
# Work setup
#
monitor = desc:ViewSonic Corporation VG3419C XF8251320138,3440x1440@120,0x0,1,bitdepth,8
monitor = desc:Technical Concepts Ltd 43S435,3840x2160@60,3440x0,1,bitdepth,8
workspace = 1, monitor:desc:Technical Concepts Ltd 43S435
workspace = 2, monitor:desc:Technical Concepts Ltd 43S435
workspace = 3, monitor:desc:ViewSonic Corporation VG3419C XF8251320138
workspace = 4, monitor:desc:ViewSonic Corporation VG3419C XF8251320138
workspace = 5, monitor:desc:ViewSonic Corporation VG3419C XF8251320138

# Force monitors on upon mouse move or key press
misc {
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}
