# Window settings
window:
   padding:
      x: 15
      y: 15


# Font settings

font:
   size: 11
   normal:
      family: SF Mono
      style: medium
   bold:
      family: SF Mono
      style: bold
   italic:
      family: SF Mono
      style: italic

# Colors (Dracula)

colors:
   
   # Default colors
   primary:
      background: '#282a36'
      foreground: '#f8f8f2'

   # Normal colors
   normal:
      black:   '#000000'
      red:     '#ff5555'
      green:   '#50fa7b'
      yellow:  '#f1fa8c'
      blue:    '#caa9fa'
      magenta: '#ff79c6'
      cyan:    '#8be9fd'
      white:   '#bfbfbf'

   # Bright colors
   bright:
      black:   '#575b70'
      red:     '#ff6e67'
      green:   '#5af78e'
      yellow:  '#f4f99d'
      blue:    '#caa9fa'
      magenta: '#ff92d0'
      cyan:    '#9aedfe'
      white:   '#e6e6e6'

bell:
     animation: EaseOutCubic
     duration: 300
     color: '#4d4f61'

background_opacity: 0.95

