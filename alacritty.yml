# Window settings
window:
   dimensions:
      columns: 90 
      lines: 30
   padding:
      x: 15
      y: 15 

# Font settings

font:
   size: 10
   offset:
      y: 2 
   normal:
      family: Hasklig
      style: semibold
   bold:
      family: Hasklig
      style: bold
   italic:
      family: Hasklig 
      style: italic

# Colors (Dracula)
colors:
  # Default colors
  primary:
    background: '0x282a36'
    foreground: '0xf8f8f2'
 
  # Normal colors
  normal:
    black:   '0x000000'
    red:     '0xff5555'
    green:   '0x50fa7b'
    yellow:  '0xf1fa8c'
    blue:    '0xbd93f9'
    magenta: '0xff79c6'
    cyan:    '0x8be9fd'
    white:   '0xbbbbbb'
 
  # Bright colors
  bright:
    black:   '0x555555'
    red:     '0xff5555'
    green:   '0x50fa7b'
    yellow:  '0xf1fa8c'
    blue:    '0xcaa9fa'
    magenta: '0xff79c6'
    cyan:    '0x8be9fd'
    white:   '0xffffff'

background_opacity: 0.95
