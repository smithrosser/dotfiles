# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
# Ghostty
set -g default-terminal "xterm-ghostty"
set -as terminal-features ",xterm-ghostty:RGB"
# Wezterm
# set -g default-terminal "wezterm"
# set -as terminal-features ",wezterm:RGB"

# Allow applications to change the window title and query colors
set -g allow-passthrough on

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# Change prefix to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Better pane splitting (and keep current path)
bind '\' split-window -h -c "#{pane_current_path}"
bind "'" split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navigate to / create extra windows
bind 1 if-shell "tmux select-window -t :1" "" "new-window -t :1 -c '#{pane_current_path}'"
bind 2 if-shell "tmux select-window -t :2" "" "new-window -t :2 -c '#{pane_current_path}'"
bind 3 if-shell "tmux select-window -t :3" "" "new-window -t :3 -c '#{pane_current_path}'"
bind 5 if-shell "tmux select-window -t :4" "" "new-window -t :4 -c '#{pane_current_path}'"
bind 5 if-shell "tmux select-window -t :5" "" "new-window -t :5 -c '#{pane_current_path}'"


# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move panes around with arrow keys
bind -r Left  select-pane -L \; swap-pane -U
bind -r Right select-pane -R \; swap-pane -D
bind -r Up    select-pane -U \; swap-pane -U
bind -r Down  select-pane -D \; swap-pane -D

# detach from session
bind q detach
bind Q kill-server

# unbind ugly 'select-pane -m' binding
unbind m

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection

# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"  # macOS
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"  # Linux
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# ============================================
# COLOR THEMING
# ============================================
set -g pane-border-lines single
set -g pane-active-border-style "fg=brightcyan,bg=default"
set -g pane-border-style "fg=color0,bg=default"
set -g pane-border-status top
set -g pane-border-format "#[align=centre] #{?pane_active,#[bold] #{pane_current_command} ,} "

# ============================================
# PLUGINS (via TPM)
# ============================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-bg "brightcyan"
set -g @minimal-tmux-indicator-str " tmux "
set -g @minimal-tmux-justify "left"
set -g @minimal-tmux-status-right "  #S"
set -g @minimal-tmux-status "top"

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'
set -g @sessionx-window-mode 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm
